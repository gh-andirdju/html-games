<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brickbreaker</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="hud" aria-label="Game status">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Lives</span>
          <strong id="lives">3</strong>
        </div>
        <div>
          <span class="label">Level</span>
          <strong id="level">1</strong>
        </div>
        <div class="effects-wrap">
          <span class="label">Effects</span>
          <strong id="effects">None</strong>
        </div>
        <div class="status-wrap">
          <span class="label">Status</span>
          <strong id="status">Playing</strong>
        </div>
      </header>

      <section class="playfield">
        <canvas id="game" width="800" height="520" aria-label="Brickbreaker game area"></canvas>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="thumb-zone movement-zone">
          <span class="control-label">Move</span>
          <div id="paddle-drag-lane" class="drag-lane" aria-label="Paddle drag lane">
            <span>Drag thumb left and right</span>
          </div>
        </div>
        <div class="thumb-zone action-zone">
          <span class="control-label">Action</span>
          <button id="restart" type="button" class="action-button">Restart</button>
          <p class="control-note">Laser auto-fires while active.</p>
        </div>
      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
